[package]
name = "contra-bulletproofs-wasm"
version = "0.1.0"
edition = "2021"
publish = false
description = "WASM bindings for DST-aware bulletproof range proofs (MySo contra)"
license = "Apache-2.0"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
bulletproofs = "5.0.0"
clear_on_drop = { version = "0.2.5", default-features = false, features = ["no_cc"] }
curve25519-dalek = { version = "4.1", default-features = false, features = ["alloc", "digest"] }
getrandom = { version = "0.2", features = ["js"] }
merlin = { version = "3.0.0", default-features = false }
rand = { version = "0.8", default-features = false, features = ["std", "std_rng"] }
wasm-bindgen = "0.2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
